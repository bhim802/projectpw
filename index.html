<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joki - Central</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <!--first page-->
    <section id="about" class="bg-section section-1">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-custom pt-4 pb-4 ">
                <div class="container-xxl">

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <i class="fas fa-bars text-white "></i>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav navbar-custom ms-auto mb-2 mb-lg-0">
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white  " aria-current="page"
                                    href="#about"><i class="fas fa-info fa-lg my-3"></i><span
                                        class="small">About</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white " aria-current="page"
                                    href="#"><i class="fas fa-shopping-cart fa-lg my-3"></i><span
                                        class="small">Shop</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white " aria-current="page"
                                    href="#benefits"><i class="fas fa-briefcase fa-lg my-3"></i><span
                                        class="small">Benefits</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white  " aria-current="page"
                                    href="#"><i class="fas fa-user-tie fa-lg my-3"></i><span
                                        class="small">Crew</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white " aria-current="page"
                                    href="#"><i class="fas fa-bell fa-lg my-3"></i><span
                                        class="small">Testimoni</span></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>



        <section>
            <div class="container pt-5">

                <div class="row text-center tc-center align-items-center ">
                    <div class=" col-md-5 text-md-start py-4 mb-4 mb-md-0 ">
                        <img src="assets/gambar/joki-central.png" class="img-fluid geser-kiri scale-up-center"
                            alt="joki central">

                    </div>




                    <div class="col-md-7 text-center position-relative">
                        <input type="radio" name="slider" id="item-1" checked>
                        <input type="radio" name="slider" id="item-2">
                        <input type="radio" name="slider" id="item-3">
                        <div class="cards">
                            <label class="card" for="item-1" id="as-1">
                                <img src="assets/gambar/chunli.png" alt="promote">
                            </label>
                            <label class="card" for="item-2" id="as-2">
                                <img src="assets/gambar/chunli.png" alt="promote">
                            </label>
                            <label class="card" for="item-3" id="as-3">
                                <img src="assets/gambar/chunli.png" alt="promote">
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container">
                <div class="pay-logos">
                    <img src="assets/gambar/pay-logo.png" class="img-fluid" alt="pay-logo">
                </div>
            </div>




        </section>
    </section>

    <!--second page-->
    <section id="benefits" class="bg-section section-2">
        <div class="container">
            <div class="container">
                <div class="row mb-5 align-items-center justify-content-center">
                    <div class="col-lg-8 ">
                        <img src="assets/gambar/jc-advantage.png" class="img-fluid " alt="joki central">
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="feature-card text-uppercase">
                            Cepat &amp;<br>Terpercaya
                        </div>
                    </div>
                    <div class="col-md-3 ">
                        <div class="feature-card h-100 text-uppercase">
                            Murah &amp; Aman
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="feature-card h-100 text-uppercase">
                            Open 24<br>Hour
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="feature-card text-uppercase">
                            3x Lose +1<br>Star
                        </div>
                    </div>
                </div>

                <div class=" small-size">
                    <img src="assets/gambar/rank-advantage.png " class="small-size" alt="joki central">
                </div>
            </div>
        </div>
    </section>




    <section class="bg-section section-3">
        <div class="container"></div>
    </section>
    <section class="bg-section section-4">
        <div class="container"></div>
    </section>
    <section class="bg-section section-5">
        <div class="container"></div>
    </section>
    <section class="bg-section section-6">
        <div class="container"></div>
    </section>
    <section class="bg-section section-7">
        <div class="container"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
