<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joki - Central</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <section class="bg-section section-1">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark ps-1 pt-4 pb-4">
                <div class="container-xxl">
                    <a class="navbar-brand" href="#intro">
                        <span class="jc-store fw-bold fs-3">
                            JC STORE
                        </span>
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <i class="fas fa-bars text-white "></i>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav navbar-custom ms-auto mb-2 mb-lg-0">
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center active text-white" aria-current="page"
                                    href="#"><i class="fas fa-info fa-lg my-3"></i><span class="small">About</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white" aria-current="page"
                                    href="#"><i class="fas fa-shopping-cart fa-lg my-3"></i><span
                                        class="small">Shop</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white" aria-current="page"
                                    href="#"><i class="fas fa-briefcase fa-lg my-3"></i><span
                                        class="small">Benefits</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white" aria-current="page"
                                    href="#"><i class="fas fa-user-tie fa-lg my-3"></i><span
                                        class="small">Crew</span></a>
                            </li>
                            <li class="nav-item ps-2">
                                <a class="nav-link d-flex flex-column text-center text-white" aria-current="page"
                                    href="#"><i class="fas fa-bell fa-lg my-3"></i><span
                                        class="small">Testimoni</span></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>

        <section>
            <div class="container pt-5">
                <div class="row align-items-center justify-content-center text-center tc-center">
                    <div class="col-md-6 text-md-start py-5 mb-4 mb-md-0">
                        <img src="assets/joki-central.png" class="img-fluid geser-kiri" alt="joki central">
                        <p class="lead my-4 fs-3 ps-4 text-white">"best carry store of all time"</p>
                    </div>

                    <div class="col-md-6">
                        <div id="carouselJoki" class="carousel geser-kanan slide shadow-lg" data-bs-ride="carousel">
                            <div class="carousel-caption">
                                <button type="button" data-bs-target="#carouselJoki" data-bs-slide-to="0" class="active"
                                    aria-current="true" aria-label="Slide 1"></button>
                                <button type="button" data-bs-target="#carouselJoki" data-bs-slide-to="1"
                                    aria-label="Slide 2"></button>
                                <button type="button" data-bs-target="#carouselJoki" data-bs-slide-to="2"
                                    aria-label="Slide 3"></button>
                            </div>

                            <div class="carousel-inner rounded-3 overflow-hidden">
                                <div class="carousel-item active">
                                    <img src="assets/ryu.png" class="d-block w-100" alt="Promo 1">
                                </div>
                                <div class="carousel-item">
                                    <img src="assets/ryu.png" class="d-block w-100" alt="Promo 2">
                                </div>
                                <div class="carousel-item">
                                    <img src="assets/ryu.png" class="d-block w-100" alt="Promo 3">
                                </div>
                            </div>

                            <button class="carousel-control-prev" type="button" data-bs-target="#carouselJoki"
                                data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#carouselJoki"
                                data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>

    <!--section 2-->
    <section class="bg-section section-2">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
            </nav>
        </div>
    </section>

    <!--section 3-->
    <section class="bg-section section-3">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
            </nav>
        </div>
    </section>

    <!--section 4-->
    <section class="bg-section section-4">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
            </nav>
        </div>
    </section>

    <!--section 5-->
    <section class="bg-section section-5">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
            </nav>
        </div>
    </section>

    <!--section 6-->
    <section class="bg-section section-6">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
            </nav>
        </div>
    </section>

    <!--section 7-->
    <section class="bg-section section-7">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
            </nav>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

</body>

</html>
